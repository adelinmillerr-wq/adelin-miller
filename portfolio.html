<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфолио — Adelin Miller</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Сохраняю все ваши оригинальные стили */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #f093fb; --red: #f5576c;
  --grad: linear-gradient(135deg, #f093fb, #f5576c);
  --dark: #08080f; --dark2: #0d0d1a; --dark3: #12121f;
  --border: #1a1a2e; --text: #e8e8ff; --muted: #555570;
}
html { scroll-behavior: smooth; overflow-x: hidden; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* Ваши оригинальные блоки дизайна */
.nav { position: fixed; top: 0; width: 100%; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; background: rgba(8,8,15,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; }
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 30px; }
.nav-links a { color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: 0.3s; opacity: 0.7; }
.nav-links a:hover { opacity: 1; color: var(--pink); }

.hero { position: relative; height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 5%; margin-top: 80px; }
.hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 12vw, 8rem); line-height: 0.9; margin-bottom: 20px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; padding: 0 5% 80px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10; }
.work-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; transition: 0.5s cubic-bezier(0.23,1,0.32,1); }
.work-card:hover { border-color: var(--pink); transform: translateY(-10px); }
.work-media { width: 100%; aspect-ratio: 16/9; position: relative; background: #000; overflow: hidden; }
.work-media video, .work-media img { width: 100%; height: 100%; object-fit: cover; }
.work-info { padding: 25px; }
.work-info h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; margin-bottom: 10px; }
.work-info p { font-size: 0.9rem; opacity: 0.5; }

/* Стили музыкального блока (совместимые с вашим дизайном) */
.music-section { padding: 40px 5% 100px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; margin-bottom: 40px; text-align: center; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.music-card { background: var(--dark2); border: 1px solid var(--border); padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; }
.music-card:hover { border-color: var(--pink); }
audio { width: 100%; height: 35px; filter: invert(100%) hue-rotate(275deg) brightness(1.5); }

canvas#stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<nav class="nav">
  <a href="index.html" class="nav-logo">Adelin Miller</a>
  <div class="nav-links">
    <a href="index.html">Главная</a>
    <a href="portfolio.html" style="opacity: 1; color: var(--pink);">Портфолио</a>
    <a href="services.html">Услуги</a>
  </div>
</nav>

<header class="hero">
  <h1>Работы &<br>Проекты</h1>
  <p style="opacity: 0.6;">Визуальные эффекты, ИИ-генерации и музыкальное сопровождение</p>
</header>

<main>
  <section class="portfolio-grid">
    <div class="work-card">
      <div class="work-media">
        <video src="video-ai-1.mp4" autoplay loop muted playsinline></video>
      </div>
      <div class="work-info">
        <h3>ИИ Визуализация</h3>
        <p>Motion Design / AI Generation</p>
      </div>
    </div>

    <div class="work-card">
      <div class="work-media">
        <img src="photo-prod-1.jpg" alt="Product Photography">
      </div>
      <div class="work-info">
        <h3>Предметная фотосъемка</h3>
        <p>Photography / Editing</p>
      </div>
    </div>
    
    </section>

  <section id="music" class="music-section">
    <h2 class="section-title">Моя Музыка</h2>
    <div class="music-grid">
      <div class="music-card">
        <h3>Серебряные нити</h3>
        <audio controls><source src="music/track1.mp3" type="audio/mpeg"></audio>
      </div>
      <div class="music-card">
        <h3>Empire of Ashes</h3>
        <audio controls><source src="music/track2.mp3" type="audio/mpeg"></audio>
      </div>
      <div class="music-card">
        <h3>Invisible Scars</h3>
        <audio controls><source src="music/track3.mp3" type="audio/mpeg"></audio>
      </div>
    </div>
  </section>
</main>

<script>
// Ваш скрипт звезд
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;
let stars = [];
for(let i=0; i<150; i++) {
  stars.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.5+0.5, t: Math.random()*Math.PI*2,
    ts: 0.02+Math.random()*0.03, color: 'rgba(240,147,251,',
    vy: 0.05+Math.random()*0.1
  });
}
function draw() {
  ctx.clearRect(0,0,W,H);
  stars.forEach(s => {
    s.t+=s.ts; s.y-=s.vy;
    if(s.y<-10) s.y=H+10;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.color + (0.3 + 0.7*Math.abs(Math.sin(s.t))) + ')';
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
window.addEventListener('resize', () => { W=window.innerWidth; H=window.innerHeight; canvas.width=W; canvas.height=H; });
</script>

</body>
</html>
